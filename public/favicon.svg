<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8d8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8e8f8;stop-opacity:1" />
    </linearGradient>
    <clipPath id="rounded">
      <rect width="400" height="400" rx="80" ry="80"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" ry="80" fill="url(#skyGrad)"/>

  <!-- Background small clouds -->
  <g clip-path="url(#rounded)" opacity="0.7">
    <!-- bottom left cloud -->
    <ellipse cx="60" cy="340" rx="70" ry="40" fill="white"/>
    <ellipse cx="100" cy="320" rx="55" ry="38" fill="white"/>
    <ellipse cx="150" cy="345" rx="60" ry="35" fill="white"/>

    <!-- bottom right cloud -->
    <ellipse cx="310" cy="335" rx="65" ry="38" fill="white"/>
    <ellipse cx="355" cy="315" rx="55" ry="36" fill="white"/>
    <ellipse cx="270" cy="345" rx="55" ry="32" fill="white"/>
  </g>

  <!-- Main central cloud -->
  <ellipse cx="200" cy="180" rx="140" ry="100" fill="white"/>
  <ellipse cx="140" cy="210" rx="80" ry="70" fill="white"/>
  <ellipse cx="260" cy="210" rx="80" ry="70" fill="white"/>
  <ellipse cx="200" cy="240" rx="130" ry="65" fill="white"/>

  <!-- "dual" text in pink -->
  <text x="105" y="235"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="90"
        font-weight="400"
        fill="#f03878"
        letter-spacing="-2">dual</text>

  <!-- "365" superscript in green -->
  <text x="285" y="185"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="52"
        font-weight="400"
        fill="#2e7d32">365</text>
</svg>
